# secret.yaml
#
# A Secret stores sensitive data like passwords, tokens and keys.
# Values are base64 encoded — NOT encrypted by default.
#
# IMPORTANT ABOUT BASE64 ENCODING:
#   Base64 is encoding, not encryption.
#   Anyone with cluster access can decode these values.
#   In production use tools like:
#     Sealed Secrets  — encrypts Secrets before storing in git
#     AWS Secrets Manager — stores secrets outside the cluster
#     HashiCorp Vault — dedicated secrets management
#
# HOW TO GENERATE BASE64 VALUES ON WINDOWS:
#   [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("appuser"))
#   [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("apppass"))
#   [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("appdb"))
#
# The values below are:
#   appuser → YXBwdXNlcg==
#   apppass → YXBwcGFzcw==
#   appdb   → YXBwZGI=
#
# Apply:  kubectl apply -f secret.yaml -n backend-dockyard
# View:   kubectl get secret app-secret -n backend-dockyard
# Detail: kubectl describe secret app-secret -n backend-dockyard
# Decode: kubectl get secret app-secret -n backend-dockyard -o jsonpath="{.data.DB_PASSWORD}" | base64 -d

apiVersion: v1
kind: Secret

metadata:
  name: app-secret
  namespace: backend-dockyard
  labels:
    app: my-app

# type: Opaque is the default for arbitrary key-value secrets
# Other types: kubernetes.io/tls for TLS certificates
#              kubernetes.io/dockerconfigjson for registry credentials
type: Opaque

# data contains base64 encoded values
# NEVER commit real passwords to git
# These are example values for learning only
data:

  # Database password — base64 encoded value of "apppass"
  DB_PASSWORD: YXBwcGFzcw==

  # Redis password — base64 encoded value of "redispass"
  REDIS_PASSWORD: cmVkaXNwYXNz

  # A fake API key — base64 encoded value of "my-secret-api-key-12345"
  API_KEY: bXktc2VjcmV0LWFwaS1rZXktMTIzNDU=