# manifests/secret.yaml
#
# Sensitive credentials for the Spring Boot application.
# Values are base64 encoded.
#
# HOW TO ENCODE ON WINDOWS POWERSHELL:
#   [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("apppass"))
#
# Encoded values used here:
#   apppass   → YXBwcGFzcw==
#   appuser   → YXBwdXNlcg==
#   appdb     → YXBwZGI=
#
# NEVER commit real production passwords to git.
# These are example values for local development only.
#
# Apply:  kubectl apply -f secret.yaml -n spring-app
# View:   kubectl describe secret spring-app-secret -n spring-app

apiVersion: v1
kind: Secret

metadata:
  name: spring-app-secret
  namespace: spring-app
  labels:
    app: spring-boot-k8s

type: Opaque

data:
  # PostgreSQL password — base64 of "apppass"
  SPRING_DATASOURCE_PASSWORD: YXBwcGFzcw==

  # PostgreSQL username — base64 of "appuser"
  POSTGRES_USER: YXBwdXNlcg==

  # PostgreSQL password for the postgres container — base64 of "apppass"
  POSTGRES_PASSWORD: YXBwcGFzcw==

  # PostgreSQL database name — base64 of "appdb"
  POSTGRES_DB: YXBwZGI=