# manifests/redis.yaml
#
# Redis Deployment and Service for the Spring Boot app.
# The Spring Boot app connects to "redis-service" by DNS name.
#
# Apply:  kubectl apply -f redis.yaml -n spring-app
# Delete: kubectl delete -f redis.yaml -n spring-app

# ── Redis Deployment ──────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment

metadata:
  name: redis
  namespace: spring-app
  labels:
    app: redis

spec:
  replicas: 1

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:
        - name: redis
          image: redis:7-alpine

          ports:
            - containerPort: 6379
              name: redis

          # Readiness probe using redis-cli ping
          # Only routes traffic when Redis is accepting connections
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 10
            failureThreshold: 5
            initialDelaySeconds: 5

          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"

---

# ── Redis Service ─────────────────────────────────────────────────────

apiVersion: v1
kind: Service

metadata:
  # Spring Boot connects to "redis-service" by this exact name
  # Configured in ConfigMap: SPRING_DATA_REDIS_HOST=redis-service
  name: redis-service
  namespace: spring-app
  labels:
    app: redis

spec:
  type: ClusterIP

  selector:
    app: redis

  ports:
    - port: 6379
      targetPort: 6379
      name: redis