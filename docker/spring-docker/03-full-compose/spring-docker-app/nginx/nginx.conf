# nginx.conf
#
# Nginx acts as a reverse proxy in front of the Spring Boot app.
#
# What is a reverse proxy?
#   Without Nginx:  Browser → Spring Boot :8080 directly
#   With Nginx:     Browser → Nginx :80 → Spring Boot :8080
#
# Benefits of putting Nginx in front:
#   - Single entry point on port 80 (standard HTTP port)
#   - Spring Boot is not exposed directly to the internet
#   - Nginx handles SSL termination in production
#   - Nginx can load balance across multiple app instances
#   - Nginx serves static files faster than Spring Boot
#   - Rate limiting and request filtering at the proxy level

# worker_processes defines how many Nginx worker processes to run
# auto means use one worker per CPU core
worker_processes auto;

events {
    # Maximum number of simultaneous connections per worker process
    worker_connections 1024;
}

http {

    # upstream defines the backend servers Nginx forwards requests to
    # spring-app is just a name we give this group of servers
    # server app:8080 means forward to the "app" service on port 8080
    # "app" is resolved by Docker DNS to the Spring Boot container IP
    upstream spring-app {
        server app:8080;
    }

    server {

        # Listen on port 80 — the standard HTTP port
        # This is what your browser connects to
        listen 80;

        # server_name is the domain name this server block handles
        # localhost means handle requests coming to localhost
        server_name localhost;

        # Access log — logs every request Nginx receives
        # useful for debugging and monitoring
        access_log /var/log/nginx/access.log;

        # Error log — logs any Nginx errors
        error_log /var/log/nginx/error.log;

        # location / means apply these rules to all incoming requests
        location / {

            # proxy_pass forwards the request to the Spring Boot app
            # http://spring-app uses the upstream block defined above
            proxy_pass http://spring-app;

            # proxy_set_header passes the original request headers
            # to the Spring Boot app so it knows the real client details

            # Host header — tells Spring Boot which host was requested
            proxy_set_header Host $host;

            # X-Real-IP — passes the real client IP address
            # Without this Spring Boot sees the Nginx container IP
            # not the actual client IP
            proxy_set_header X-Real-IP $remote_addr;

            # X-Forwarded-For — standard header for proxied requests
            # Contains the chain of IPs the request passed through
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # X-Forwarded-Proto — tells Spring Boot whether the original
            # request was HTTP or HTTPS
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout settings
            # How long Nginx waits for Spring Boot to respond
            # Increase these if your app has slow endpoints
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Separate location block for Actuator health endpoints
        # These are used by monitoring tools and Kubernetes probes
        location /actuator/health {
            proxy_pass http://spring-app;
            proxy_set_header Host $host;
        }
    }
}